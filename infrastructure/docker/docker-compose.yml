services:
  postgres:
    image: postgres:16-alpine
    container_name: osaja-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: osaja_welfare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../docs/architecture/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    container_name: osaja-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    container_name: osaja-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/osaja_welfare
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../apps/api:/app

volumes:
  postgres_data:
  redis_data:
