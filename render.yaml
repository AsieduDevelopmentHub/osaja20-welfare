# Render Blueprint — API web service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: osaja-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn v1.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "false"
      # Set in Render dashboard: DATABASE_URL, JWT_SECRET, CORS_ORIGINS, etc.
