# Render Blueprint — API web service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: osaja-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn v1.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: osaja-uploads
      mountPath: uploads
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "false"
      - key: ALLOW_TUNNEL_CORS
        value: "false"
      - key: REGISTRATION_AUTO_APPROVE
        value: "false"
      - key: JOB_WORKER_ENABLED
        value: "false"
      # Set in Render dashboard: DATABASE_URL, JWT_SECRET, CORS_ORIGINS,
      # MEMBER_PORTAL_URL, VAPID_*, PAYSTACK_*, WHATSAPP_NUMBER, etc.
